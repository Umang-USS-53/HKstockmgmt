<!DOCTYPE html>
<html>
<head>
    <title>Purchase Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="style.css">

    <style>
        table {
            width: 100%;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Manage Purchases</h2>

    <table id="purchaseTable">
        <thead>
            <tr>
                <th>Invoice No</th>
                <th>Date</th>
                <th>Vendor</th>
                <th>Type</th>
                <th>Total</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script src="purchase-manager.js"></script>

<!-- MODAL -->
<div id="purchaseModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4);">
    
    <div style="background:#fff; margin:10% auto; padding:20px; width:80%; border-radius:8px; position:relative;">
        
        <span onclick="closeModal()" 
              style="position:absolute; right:15px; top:10px; cursor:pointer; font-size:20px;">
              &times;
        </span>

        <div id="purchaseDetails"></div>

    </div>

</div>

</body>
</html>
