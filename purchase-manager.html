<!DOCTYPE html>
<html>
<head>
    <title>Purchase Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="style.css">

    <style>
        table {
            width: 100%;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
        }

        .modal-content {
            background: #fff;
            margin: 3% auto;
            padding: 20px;
            width: 80%;
            border-radius: 8px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .close {
            position: absolute;
            right: 15px;
            top: 10px;
            cursor: pointer;
            font-size: 22px;
        }

        #filePreviewContainer {
            margin-top: 20px;
        }

        #downloadBtn {
            margin-top: 15px;
            padding: 10px 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        #downloadBtn:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Manage Purchases</h2>

    <table id="purchaseTable">
        <thead>
            <tr>
                <th>Invoice No</th>
                <th>Date</th>
                <th>Vendor</th>
                <th>Type</th>
                <th>Total</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script src="purchase-manager.js"></script>

<!-- MODAL -->
<div id="purchaseModal" class="modal">
    
    <div class="modal-content">
        
        <span class="close" onclick="closeModal()">&times;</span>

        <div id="purchaseDetails"></div>

        <!-- FILE PREVIEW -->
        <div id="filePreviewContainer"></div>

        <!-- DOWNLOAD BUTTON -->
        <button id="downloadBtn">Download File</button>

    </div>

</div>

</body>
</html>
