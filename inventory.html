<!DOCTYPE html>
<html>
<head>
    <title>Inventory Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h2 {
            margin-bottom: 30px;
        }

        button {
            background-color: #007bff;
            color: white;
            font-size: 1.2rem;
            padding: 15px 30px;
            margin-bottom: 20px;
            border: none;
            border-radius: 8px;
            width: 300px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h2>Inventory Management</h2>

<button onclick="openOpeningStock()">OPENING STOCK ENTRY</button>

<button onclick="window.location.href='closing-stock.html?loggedIn=true'">
    CLOSING STOCK VALUATION
</button>

<button onclick="window.location.href='stock-ledger.html?loggedIn=true'">
    GENERATE STOCK LEDGER
</button>

<button onclick="window.location.href='buttons.html?loggedIn=true'">
    ⬅ BACK
</button>

<script>
function openOpeningStock() {

    const password = prompt("Enter password:");

    if (password === "hkstock") {
        window.location.href = 'opening-stock.html?loggedIn=true';
    } else {
        alert("Incorrect password");
    }
}
</script>

</body>
</html>
